# KeyForge slicing profile — Ender 3 V3 KE, 0.2mm PLA keychains
# Hand-written starter: keys not listed fall back to PrusaSlicer defaults.
# Before the first real print, open a sliced file in the PrusaSlicer GUI preview and sanity-check it.

# printer
bed_shape = 0x0,220x0,220x220,0x220
max_print_height = 240
gcode_flavor = klipper
nozzle_diameter = 0.4
retract_length = 0.8
retract_speed = 40
use_relative_e_distances = 1

# filament (PLA)
filament_diameter = 1.75
filament_density = 1.24
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 60

# print
layer_height = 0.28
first_layer_height = 0.28
perimeters = 3
top_solid_layers = 3
bottom_solid_layers = 3
fill_density = 12%
skirts = 1
skirt_distance = 3
brim_width = 0
support_material = 0

# speeds — V3 KE is a Klipper speed printer; firmware caps acceleration itself
perimeter_speed = 80
external_perimeter_speed = 50
infill_speed = 120
solid_infill_speed = 100
top_solid_infill_speed = 60
travel_speed = 250
first_layer_speed = 25

start_gcode = G90\nM83\nM140 S[first_layer_bed_temperature]\nM104 S[first_layer_temperature]\nG28\nM190 S[first_layer_bed_temperature]\nM109 S[first_layer_temperature]\nG1 Z2 F1200\nG1 X5 Y10 F6000\nG1 Z0.28 F600\nG92 E0\nG1 Y120 E12 F600\nG92 E0\nG1 Z1 F1200
end_gcode = M104 S0\nM140 S0\nM107\nG91\nG1 Z5 F1200\nG90\nG1 X10 Y200 F6000\nM84
