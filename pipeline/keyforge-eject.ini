# KeyForge slicing profile + AUTO-EJECT — Ender 3 V3 KE, 0.2mm PLA keychains
# Same as keyforge.ini except end_gcode: after the print, the bed heater turns off, the
# printer dwells 15 minutes for the plate to cool (PLA releases below ~30C), then the nozzle
# parks 1.6mm above the plate behind the part and the bed drives back, sweeping the part off
# the front edge. Watch the first runs in person. Timer-based cooldown for firmware
# compatibility; switch to TEMPERATURE_WAIT once verified on the stock Creality Klipper.

# printer
bed_shape = 0x0,220x0,220x220,0x220
max_print_height = 240
gcode_flavor = klipper
nozzle_diameter = 0.4
retract_length = 0.8
retract_speed = 40
use_relative_e_distances = 1

# filament (PLA)
filament_diameter = 1.75
filament_density = 1.24
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 60

# print
layer_height = 0.28
first_layer_height = 0.28
perimeters = 3
top_solid_layers = 3
bottom_solid_layers = 3
fill_density = 12%
skirts = 1
skirt_distance = 3
brim_width = 0
support_material = 0

# speeds — V3 KE is a Klipper speed printer; firmware caps acceleration itself
perimeter_speed = 80
external_perimeter_speed = 50
infill_speed = 120
solid_infill_speed = 100
top_solid_infill_speed = 60
travel_speed = 250
first_layer_speed = 25

start_gcode = G90\nM83\nM140 S[first_layer_bed_temperature]\nM104 S[first_layer_temperature]\nG28\nM190 S[first_layer_bed_temperature]\nM109 S[first_layer_temperature]\nG1 Z2 F1200\nG1 X5 Y10 F6000\nG1 Z0.28 F600\nG92 E0\nG1 Y120 E12 F600\nG92 E0\nG1 Z1 F1200
end_gcode = M104 S0\nM140 S0\nM107\nG90\nG1 Z15 F1200\nG1 X110 Y215 F6000\nG4 P900000\nG1 Z1.6 F600\nG1 Y2 F1800\nG1 Z15 F1200\nG1 Y215 F6000\nG1 X85 F6000\nG1 Z1.6 F600\nG1 Y2 F1800\nG1 Z15 F1200\nG1 Y215 F6000\nG1 X135 F6000\nG1 Z1.6 F600\nG1 Y2 F1800\nG1 Z15 F1200\nG1 X110 Y110 F6000\nM84
